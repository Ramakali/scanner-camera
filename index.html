<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f0f2f5;
}

canvas, img {
  width: 90%;
  max-width: 500px;
  margin-top: 10px;
  border-radius: 8px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h2>Detector ArUco (Imagem)</h2>

<div id="status">Carregando OpenCV...</div>

<input type="file" id="fileInput" accept="image/*">
<br>
<button onclick="processImage()">Detectar</button>

<br>
<img id="preview">
<canvas id="canvas"></canvas>

<script src="https://docs.opencv.org/4.10.0/opencv.js"></script>

<script>
const status = document.getElementById('status');
const input = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const canvas = document.getElementById('canvas');

let dictionary, parameters, corners, ids;
let ready = false;

// 🔁 Aguarda OpenCV de forma segura
let check = setInterval(() => {
  if (window.cv && cv.getBuildInformation) {
    clearInterval(check);
    init();
  }
}, 100);

function init() {
  try {
    dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
    parameters = new cv.DetectorParameters();

    corners = new cv.MatVector();
    ids = new cv.Mat();

    ready = true;
    status.innerText = "OpenCV pronto";

  } catch (e) {
    status.innerText = "Erro ao iniciar: " + e;
    console.error(e);
  }
}

// Preview da imagem
input.onchange = () => {
  let file = input.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
  }
};

function processImage() {
  if (!ready) {
    status.innerText = "OpenCV ainda carregando...";
    return;
  }

  if (!preview.src) {
    status.innerText = "Selecione uma imagem";
    return;
  }

  try {
    let src = cv.imread(preview);

    // opcional: reduzir tamanho (performance)
    cv.resize(src, src, new cv.Size(640, 480));

    cv.detectMarkers(src, dictionary, corners, ids, parameters);

    if (ids.rows > 0) {
      cv.drawDetectedMarkers(src, corners, ids);

      let lista = [];
      for (let i = 0; i < ids.rows; i++) {
        lista.push(ids.data32S[i]);
      }

      status.innerText = "IDs detectados: " + lista.join(", ");
    } else {
      status.innerText = "Nenhum marcador encontrado";
    }

    cv.imshow(canvas, src);
    src.delete();

  } catch (err) {
    console.error(err);
    status.innerText = "Erro na detecção";
  }
}
</script>

</body>
</html>
