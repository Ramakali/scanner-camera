<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: sans-serif; text-align:center; background:#f0f2f5; }

.tabs {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  background: #ddd;
  margin: 2px;
  border-radius: 5px;
}

.active {
  background: #4285f4;
  color: white;
}

video, canvas {
  width: 90%;
  max-width: 500px;
  border-radius: 8px;
  margin-top: 10px;
}
  

button {
  margin-top: 10px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h2>Scanner com ArUco</h2>

<div class="tabs">
  <div class="tab active" onclick="setTab('scanner')">Scanner</div>
  <div class="tab" onclick="setTab('tools')">Tools</div>
</div>

<div id="status">Inicializando...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<button id="btn">Capturar Medida</button>
<div id="dim"></div>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const btn = document.getElementById('btn');
const status = document.getElementById('status');
const dim = document.getElementById('dim');

let mode = "scanner";
let latestMeasurement = null;

// ================= TAB =================
function setTab(tab) {
  mode = tab;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  status.innerText = tab === "tools"
    ? "Modo Tools: mostrando ArUco"
    : "Modo Scanner";
}

// ================= OpenCV =================
cv['onRuntimeInitialized'] = () => {
  status.innerText = "OpenCV pronto. Iniciando câmera...";
  startCamera();
};

// ================= CAMERA =================
async function startCamera() {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });
    video.srcObject = stream;
  } catch {
    let stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  }
}

// ================= LOOP =================
video.addEventListener("playing", () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  requestAnimationFrame(processFrame);
});

// ================= FRAME =================
function processFrame() {

  try {

    // 🔒 1. GARANTE QUE O VIDEO ESTÁ PRONTO
    if (video.videoWidth === 0 || video.videoHeight === 0) {
      requestAnimationFrame(processFrame);
      return;
    }

    // 🔒 2. AJUSTA CANVAS
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // 🔒 3. DESENHA FRAME
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // 🔒 4. LÊ COM OPENCV
    let src = cv.imread(canvas);

    // ===== DETECÇÃO =====
    let dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
    let corners = new cv.MatVector();
    let ids = new cv.Mat();

    cv.detectMarkers(src, dictionary, corners, ids);

    if (ids.rows > 0) {

      cv.drawDetectedMarkers(src, corners, ids);

      let arr = [];
      for (let i = 0; i < ids.rows; i++) {
        arr.push(ids.data32S[i]);
      }

      status.innerText = "ArUco: " + arr.join(",");

    } else {
      status.innerText = "Nenhum ArUco";
    }

    // 🔒 5. MOSTRA RESULTADO (IMPORTANTE!)
    cv.imshow('canvas', src);

    // 🔒 6. LIMPEZA
    src.delete();
    corners.delete();
    ids.delete();

  } catch (err) {

    console.error(err);
    status.innerText = "Erro: " + err;

  }

  // 🔁 LOOP CONTÍNUO
  requestAnimationFrame(processFrame);
}

// ================= CAPTURE =================
btn.onclick = () => {
  if (latestMeasurement) {
    dim.innerText = `Capturado: ${latestMeasurement.wMm} x ${latestMeasurement.hMm} mm`;
  } else {
    alert("Nenhuma medida disponível ainda");
  }
};

// ================= UTIL =================
function getSortedCorners(contour) {
  let pts = [];
  for (let i = 0; i < 4; i++) {
    pts.push({
      x: contour.data32S[i*2],
      y: contour.data32S[i*2+1]
    });
  }

  pts.sort((a,b)=>a.y-b.y);
  let top = pts.slice(0,2).sort((a,b)=>a.x-b.x);
  let bottom = pts.slice(2,4).sort((a,b)=>b.x-a.x);

  return [
    top[0].x, top[0].y,
    top[1].x, top[1].y,
    bottom[0].x, bottom[0].y,
    bottom[1].x, bottom[1].y
  ];
}
</script>

</body>
</html>
