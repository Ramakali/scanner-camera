<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
canvas, img { width: 90%; max-width: 500px; margin-top: 10px; }
</style>
</head>

<body>

<h2>Detector ArUco</h2>
<div id="status">Carregando...</div>

<input type="file" id="fileInput" accept="image/*"><br><br>
<button onclick="detectar()">Detectar</button>

<br>
<img id="img">
<canvas id="canvas"></canvas>

<!-- 🔒 BUILD FIXA (TESTADA) -->
<script src="https://cdn.jsdelivr.net/npm/opencv-js@1.2.1/opencv.js"></script>

<script>
let ready = false;
let dictionary, parameters, corners, ids;

const status = document.getElementById("status");
const img = document.getElementById("img");
const input = document.getElementById("fileInput");

// 🔒 ESPERA REAL PELO OPENCV
let intervalo = setInterval(() => {
  if (cv && cv.imread) {
    clearInterval(intervalo);
    iniciar();
  }
}, 100);

function iniciar() {
  try {
    dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
    parameters = cv.DetectorParameters_create();
    corners = new cv.MatVector();
    ids = new cv.Mat();

    ready = true;
    status.innerText = "Pronto";
  } catch (e) {
    status.innerText = "Erro ao iniciar";
    console.error(e);
  }
}

input.onchange = () => {
  const file = input.files[0];
  if (file) img.src = URL.createObjectURL(file);
};

function detectar() {

  if (!ready) {
    status.innerText = "OpenCV não carregou";
    return;
  }

  if (!img.src) {
    status.innerText = "Escolha uma imagem";
    return;
  }

  try {
    let src = cv.imread(img);

    // reduz peso
    cv.resize(src, src, new cv.Size(640, 480));

    cv.detectMarkers(src, dictionary, corners, ids, parameters);

    if (ids.rows > 0) {
      cv.drawDetectedMarkers(src, corners, ids);

      let lista = [];
      for (let i = 0; i < ids.rows; i++) {
        lista.push(ids.data32S[i]);
      }

      status.innerText = "Detectado: " + lista.join(", ");
    } else {
      status.innerText = "Nenhum marcador";
    }

    cv.imshow("canvas", src);
    src.delete();

  } catch (e) {
    status.innerText = "Erro na detecção";
    console.error(e);
  }
}
</script>

</body>
</html>
