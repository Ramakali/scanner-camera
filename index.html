<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { text-align: center; font-family: sans-serif; }
canvas, img { width: 300px; margin-top: 10px; }
</style>
</head>

<body>

<h3>ArUco Detector</h3>
<div id="status">Carregando...</div>

<input type="file" id="file"><br><br>
<img id="img">
<canvas id="canvas"></canvas>

<script src="https://rawcdn.githack.com/opencv/opencv/4.x/platforms/js/opencv.js"></script>

<script>
const status = document.getElementById("status");
const img = document.getElementById("img");

let dictionary, parameters, corners, ids;
let ready = false;

// 🔒 espera real do OpenCV
cv['onRuntimeInitialized'] = () => {
  try {
    dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);

    // API compatível
    parameters = cv.DetectorParameters_create();

    corners = new cv.MatVector();
    ids = new cv.Mat();

    ready = true;
    status.innerText = "ArUco pronto";

  } catch (e) {
    status.innerText = "Erro: " + e;
    console.error(e);
  }
};

// imagem
document.getElementById("file").onchange = e => {
  const file = e.target.files[0];
  if (file) img.src = URL.createObjectURL(file);
};

// detecção
img.onload = () => {
  if (!ready) {
    status.innerText = "OpenCV ainda não pronto";
    return;
  }

  try {
    let src = cv.imread(img);

    cv.detectMarkers(src, dictionary, corners, ids, parameters);

    if (ids.rows > 0) {
      cv.drawDetectedMarkers(src, corners, ids);

      let lista = [];
      for (let i = 0; i < ids.rows; i++) {
        lista.push(ids.data32S[i]);
      }

      status.innerText = "IDs: " + lista.join(", ");
    } else {
      status.innerText = "Nenhum marcador";
    }

    cv.imshow("canvas", src);
    src.delete();

  } catch (e) {
    status.innerText = "Erro na detecção";
    console.error(e);
  }
};
</script>

</body>
</html>
