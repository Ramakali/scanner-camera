<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f0f2f5;
}

video, canvas {
  width: 90%;
  max-width: 500px;
  border-radius: 8px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h2>Scanner com ArUco</h2>

<div id="status">Inicializando...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<button id="btn">Capturar</button>
<div id="dim"></div>

<!-- OpenCV com WASM -->
<script async src="https://docs.opencv.org/4.10.0/opencv.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const status = document.getElementById('status');

let detector, dictionary, parameters;
let src, corners, ids;

let initialized = false;

// ================= INIT =================
cv['onRuntimeInitialized'] = () => {

  try {

    // 🔒 Inicializa UMA VEZ
    dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
    parameters = new cv.DetectorParameters();
    detector = new cv.ArucoDetector(dictionary, parameters);

    corners = new cv.MatVector();
    ids = new cv.Mat();

    status.innerText = "OpenCV + ArUco OK";

    initialized = true;

    startCamera();

  } catch (e) {
    status.innerText = "Erro ao iniciar ArUco: " + e;
    console.error(e);
  }
};

// ================= CAMERA =================
async function startCamera() {

  try {
    let stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });
    video.srcObject = stream;
  } catch {
    let stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  }

  video.addEventListener("playing", () => {
    requestAnimationFrame(processFrame);
  });
}

// ================= LOOP =================
function processFrame() {
  if (!initialized || video.paused || video.ended || video.videoWidth === 0) {
    requestAnimationFrame(processFrame);
    return;
  }

  try {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // 💡 Forma mais estável de ler do Canvas para o OpenCV
    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let src = cv.matFromImageData(imgData);

    // Converte para RGB se necessário (ArUco prefere ou escala de cinza ou RGB)
    // Se a detecção falhar, tente: cv.cvtColor(src, src, cv.COLOR_RGBA2RGB);

    detector.detectMarkers(src, corners, ids);

    if (ids.rows > 0) {
      cv.drawDetectedMarkers(src, corners, ids);
      
      let lista = [];
      for (let i = 0; i < ids.rows; i++) {
        lista.push(ids.data32S[i]);
      }
      status.innerText = "IDs: " + lista.join(", ");
    } else {
      status.innerText = "Buscando ArUco...";
    }

    cv.imshow('canvas', src);

    // Limpeza obrigatória para não travar o browser
    src.delete(); 

  } catch (err) {
    // Se o erro for "OpenCV Error: Insufficient memory", o delete() falhou
    console.error("Erro no processamento:", err);
  }

  requestAnimationFrame(processFrame);
}

// ================= CAPTURE =================
document.getElementById('btn').onclick = () => {
  alert("Captura ainda não integrada com medição");
};
</script>

</body>
</html>
