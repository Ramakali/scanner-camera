<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f0f2f5;
}

.tabs {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  background: #ddd;
  margin: 2px;
  border-radius: 5px;
}

.active {
  background: #4285f4;
  color: white;
}

video, canvas {
  width: 90%;
  max-width: 500px;
  border-radius: 8px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h2>Scanner com ArUco</h2>

<div class="tabs">
  <div class="tab active" onclick="setTab(event,'scanner')">Scanner</div>
  <div class="tab" onclick="setTab(event,'tools')">Tools</div>
</div>

<div id="status">Inicializando...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<button id="btn">Capturar Medida</button>
<div id="dim"></div>

<script async src="https://cdn.jsdelivr.net/gh/TechStark/opencv-js@latest/opencv.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const btn = document.getElementById('btn');
const status = document.getElementById('status');
const dim = document.getElementById('dim');

let mode = "scanner";
let latestMeasurement = null;

let detector = null;

// ================= TAB =================
function setTab(e, tab) {
  mode = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
}

// ================= OpenCV =================
cv['onRuntimeInitialized'] = () => {

  if (cv.ArucoDetector) {

    let dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
    let parameters = new cv.DetectorParameters();

    detector = new cv.ArucoDetector(dictionary, parameters);

    status.innerText = "OpenCV + ArUco OK";

  } else {

    status.innerText = "ERRO: OpenCV sem ArUco";
  }

  startCamera();
};

// ================= CAMERA =================
async function startCamera() {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });
    video.srcObject = stream;
  } catch {
    let stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  }
}

// ================= LOOP =================
video.addEventListener("playing", () => {
  requestAnimationFrame(processFrame);
});

// ================= FRAME =================
function processFrame() {

  try {

    if (video.videoWidth === 0) {
      requestAnimationFrame(processFrame);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let src = cv.imread(canvas);

    let corners = new cv.MatVector();
    let ids = new cv.Mat();

    // ===== ARUCO =====
    if (detector) {

      detector.detectMarkers(src, corners, ids);

      if (ids.rows > 0) {

        cv.drawDetectedMarkers(src, corners, ids);

        let arr = [];
        for (let i = 0; i < ids.rows; i++) {
          arr.push(ids.data32S[i]);
        }

        status.innerText = "ArUco: " + arr.join(",");

      } else {
        status.innerText = "Sem ArUco";
      }

    }

    cv.imshow('canvas', src);

    src.delete();
    corners.delete();
    ids.delete();

  } catch (err) {

    console.error(err);
    status.innerText = "Erro: " + err;

  }

  requestAnimationFrame(processFrame);
}

// ================= CAPTURE =================
btn.onclick = () => {
  if (latestMeasurement) {
    dim.innerText = `Capturado: ${latestMeasurement.wMm} x ${latestMeasurement.hMm}`;
  } else {
    alert("Nenhuma medida disponível ainda");
  }
};
</script>

</body>
</html>
