<body>
    <h2>🎯 Detector 4x4 - Código do seu arquivo</h2>
    <button id="btnCamera">📷 ATIVAR CÂMERA</button>
    
    <video id="video" autoplay playsinline muted style="display: none;"></video>
    <canvas id="canvas"></canvas>
    
    <div class="status" id="status">⏳ Aguardando...</div>

    <script>
        // ==========================================
        // DICIONÁRIO 4x4 DO SEU ARQUIVO
        // Código do ID 1: bytes [15, 154] = 0x9A0F
        // ==========================================
        
        // Código do marcador ID 1 extraído do seu arquivo
        const ID_1_CODE = 0x9A0F;  // bytes [15, 154]
        
        // Função para extrair os bits do marcador a partir dos cantos
        function extractBits(imageData, corners, markerSize = 4) {
            const width = imageData.width;
            const height = imageData.height;
            const data = imageData.data;
            
            // Calcula o tamanho do marcador em pixels
            const side = Math.hypot(corners[1].x - corners[0].x, corners[1].y - corners[0].y);
            const cellSize = side / (markerSize + 2); // +2 para a borda preta
            
            if (cellSize < 6) return null; // Marcador muito pequeno
            
            const bits = [];
            
            // Percorre as células internas (ignorando a borda)
            for (let row = 1; row <= markerSize; row++) {
                for (let col = 1; col <= markerSize; col++) {
                    // Ponto central da célula
                    const x = corners[0].x + (col + 0.5) * cellSize;
                    const y = corners[0].y + (row + 0.5) * cellSize;
                    
                    if (x >= 0 && x < width && y >= 0 && y < height) {
                        const idx = (Math.floor(y) * width + Math.floor(x)) * 4;
                        const brightness = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                        // Preto = 0, Branco = 1 (assumindo que o marcador tem borda preta)
                        bits.push(brightness < 128 ? 1 : 0);
                    } else {
                        bits.push(0);
                    }
                }
            }
            
            return bits;
        }
        
        // Converte bits para número
        function bitsToNumber(bits) {
            let num = 0;
            for (let i = 0; i < bits.length; i++) {
                if (bits[i]) num |= (1 << (bits.length - 1 - i));
            }
            return num;
        }
        
        // Detecta contornos de quadrados na imagem (simplificado)
        // Esta é uma versão simplificada - para detecção real, precisaríamos de um algoritmo robusto

            // Uma implementação completa exigiria detecção de contornos e aproximação de polígonos
            return [];
        }
        
        // ==========================================
        // CÂMERA E LOOP PRINCIPAL
        // ==========================================
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        
        canvas.width = 640;
        canvas.height = 480;
        
        let cameraAtiva = false;
        let animationId = null;
        
        // Função de detecção simplificada
        // NOTA: Esta é uma versão básica. Para detecção real, é necessário um algoritmo
        // de detecção de quadrados. Como o js-aruco2 não está carregando, esta é uma alternativa.
        
        function detectar() {
            if (!cameraAtiva || !video.videoWidth) {
                if (cameraAtiva) {
                    animationId = requestAnimationFrame(detectar);
                }
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Exibe mensagem informativa
            statusDiv.innerHTML = '⚠️ Detector simplificado ativo.\n\nPara detectar seu marcador 4x4, precisamos da biblioteca aruco.js.\n\nClique no link abaixo para baixar:\n\nhttps://github.com/AR-js-org/aruco-js\n\nBaixe o ZIP, extraia e copie o arquivo aruco.js para a mesma pasta.';
            statusDiv.style.background = '#ff8c00';
            statusDiv.style.color = '#000';
            
            animationId = requestAnimationFrame(detectar);
        }
        
        async function ativarCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            
            statusDiv.innerHTML = '📷 Solicitando permissão da câmera...';
            statusDiv.style.background = '#222';
            statusDiv.style.color = 'white';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraAtiva = true;
                    statusDiv.innerHTML = '📷 Câmera ativa! Aguardando...';
                    detectar();
                };
            } catch(err) {
                let msg = err.name === 'NotAllowedError' 
                    ? 'Permissão negada. Vá em Configurações e permita a câmera.' 
                    : err.message;
                statusDiv.innerHTML = `❌ ${msg}`;
                statusDiv.style.background = '#8b0000';
            }
        }
        
        btnCamera.addEventListener('click', ativarCamera);
        
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
