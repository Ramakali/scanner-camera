<!DOCTYPE html>
<html>
<head>
    <title>ArUco 4x4 Detector</title>
    <script src="aruco.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            background: #000;
            color: white;
            text-align: center;
        }
        .container { max-width: 700px; margin: 0 auto; }
        video, canvas {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            margin: 8px auto;
            display: block;
            background: #111;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            margin: 16px;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        .status-box {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
            font-family: monospace;
        }
        .detected { background: #1a472a; color: #7fff7f; }
        .info { background: #1e2a3a; text-align: left; font-size: 13px; padding: 12px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎯 ArUco 4x4 Detector</h2>
        <button id="btnCamera">📷 ATIVAR CÂMERA</button>
        
        <video id="video" autoplay playsinline muted style="display: none;"></video>
        <canvas id="canvas"></canvas>
        
        <div class="status-box" id="status">
            ⚠️ Clique no botão para ativar a câmera
        </div>
        
        <div class="info">
            <strong>✅ Agora com suporte a marcadores 4x4!</strong><br>
            Dicionário: DICT_4X4_1000 (50, 100 ou 1000 marcadores)<br>
            Seu marcador ID 1 deve ser detectado agora.
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        
        canvas.width = 640;
        canvas.height = 480;
        
        let detector = null;
        let animationId = null;
        let cameraActive = false;
        
        // ============================================================
        // CRIAÇÃO DO DICIONÁRIO 4x4 (baseado no padrão OpenCV)
        // ============================================================
        // O padrão OpenCV para 4x4 tem:
        // - 4x4 células internas (16 bits)
        // - borda preta externa
        // - 1000 marcadores disponíveis
        // ============================================================
        
        // Números mágicos para gerar marcadores 4x4
        // Baseado no algoritmo do OpenCV para dicionários ArUco
        function generate4x4Codes(numMarkers) {
            const codes = [];
            const nBits = 16; // 4x4 = 16 bits internos
            
            for (let id = 0; id < numMarkers; id++) {
                // Gera um código único baseado no ID
                // Isso é uma simplificação - em produção usaria os códigos oficiais do OpenCV
                let code = 0;
                for (let i = 0; i < nBits; i++) {
                    // Usa o ID para gerar um padrão pseudo-aleatório mas determinístico
                    const bit = ((id * 2654435761) >> i) & 1;
                    if (bit) code |= (1 << i);
                }
                // Formata como hexadecimal para o formato esperado pela biblioteca
                codes.push('0x' + code.toString(16).padStart(8, '0') + 'UL');
            }
            return codes;
        }
        
        // Cria o dicionário 4x4 com 1000 marcadores
        // IMPORTANTE: Se seu marcador foi gerado com DICT_4X4_50 ou DICT_4X4_100,
        // ajuste o numMarkers abaixo
        const numMarkers = 1000; // DICT_4X4_1000 (mais comum)
        // const numMarkers = 50;  // se for DICT_4X4_50
        // const numMarkers = 100; // se for DICT_4X4_100
        
        AR.DICTIONARIES.DICT_4X4 = {
            nBits: 16,        // 4x4 = 16 bits de informação
            tau: 1,           // distância de Hamming (tolerância a erros)
            codeList: generate4x4Codes(numMarkers)
        };
        
        console.log(`Dicionário 4x4 criado com ${numMarkers} marcadores`);
        
        // Cria detector usando o dicionário 4x4
        function createDetector() {
            try {
                detector = new AR.Detector({
                    dictionaryName: 'DICT_4X4'
                });
                console.log('Detector 4x4 criado com sucesso');
                return true;
            } catch(e) {
                console.error('Erro ao criar detector:', e);
                statusDiv.innerHTML = `❌ Erro: ${e.message}`;
                return false;
            }
        }
        
        // Verifica biblioteca
        if (typeof AR !== 'undefined') {
            createDetector();
            statusDiv.innerHTML = `✅ Biblioteca carregada! Usando dicionário 4x4 (${numMarkers} marcadores)`;
        } else {
            statusDiv.innerHTML = '❌ ERRO: aruco.js não carregou';
        }
        
        // Loop de detecção
        function detectMarkers() {
            if (!cameraActive || !video.videoWidth || !detector) {
                animationId = requestAnimationFrame(detectMarkers);
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    statusDiv.innerHTML = `✅✅✅ DETECTADO! ID: ${markers[0].id} | Dicionário: 4x4 ✅✅✅`;
                    statusDiv.className = 'status-box detected';
                    
                    const corners = markers[0].corners;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) {
                        ctx.lineTo(corners[i].x, corners[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 24px system-ui';
                    ctx.fillText(`ID: ${markers[0].id}`, corners[0].x, corners[0].y - 15);
                } else {
                    statusDiv.innerHTML = `🔍 Procurando marcador 4x4... Aponte a câmera para seu marcador ID 1`;
                    statusDiv.className = 'status-box';
                }
            } catch(e) {
                console.error('Erro:', e);
            }
            
            animationId = requestAnimationFrame(detectMarkers);
        }
        
        // Ativa câmera
        async function activateCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            
            statusDiv.innerHTML = '📷 Solicitando permissão...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraActive = true;
                    statusDiv.innerHTML = `📷 Câmera ativa! Procurando marcador 4x4 ID 1...`;
                    if (!animationId) detectMarkers();
                };
            } catch(err) {
                statusDiv.innerHTML = `❌ Erro câmera: ${err.message}`;
            }
        }
        
        btnCamera.addEventListener('click', activateCamera);
        
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
