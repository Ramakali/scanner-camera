<!DOCTYPE html>
<html>
<head>
    <title>ArUco 4x4 - Do seu arquivo Predefined_dictionary.hpp</title>
    <script src="https://cdn.jsdelivr.net/npm/js-aruco2@2.0.0/src/aruco.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            background: #000;
            color: white;
            text-align: center;
        }
        video, canvas {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            margin: 8px auto;
            display: block;
            background: #111;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            margin: 16px;
            cursor: pointer;
        }
        .status {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            margin: 12px;
            font-family: monospace;
        }
        .detected { background: #1a472a; color: #7fff7f; }
        .info {
            background: #1e2a3a;
            padding: 12px;
            border-radius: 12px;
            margin: 12px;
            text-align: left;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h2>🎯 ArUco 4x4 - Dados do seu arquivo</h2>
    <button id="btnCamera">📷 ATIVAR CÂMERA</button>
    
    <video id="video" autoplay playsinline muted style="display: none;"></video>
    <canvas id="canvas"></canvas>
    
    <div class="status" id="status">⏳ Carregando...</div>
    
    <div class="info">
        <strong>✅ Extraído diretamente do DICT_4X4_1000_BYTES do seu arquivo</strong><br>
        • Seu marcador ID 1 → bytes [15, 154] → código 0x9A0F<br>
        • Nenhum código inventado - todos vêm do seu arquivo
    </div>

    <script>
        // ==========================================
        // DADOS EXTRAÍDOS DO SEU ARQUIVO Predefined_dictionary.hpp
        // DICT_4X4_1000_BYTES - primeiros 50 marcadores
        // ==========================================
        
        // Bytes do seu arquivo para os primeiros marcadores 4x4
        // Cada marcador tem 4 rotações, cada rotação com 2 bytes
        // Usamos a primeira rotação (0 graus)
        
        // Lista de códigos (16 bits cada) extraídos do seu arquivo
        // Os bytes são little-endian: byte1 é o menos significativo
        const CODIGOS_DO_SEU_ARQUIVO = [
            0x32B5,  // ID 0: bytes [181, 50] = 0x32B5
            0x9A0F,  // ID 1: bytes [15, 154] = 0x9A0F  <--- SEU MARCADOR!
            0x2D33,  // ID 2: bytes [51, 45] = 0x2D33
            0x4699,  // ID 3: bytes [153, 70] = 0x4699
            0x9E54,  // ID 4: bytes [84, 158] = 0x9E54
            0xCD79,  // ID 5: bytes [121, 205] = 0xCD79
            0x2E9E,  // ID 6: bytes [158, 46] = 0x2E9E
            0xF2C4,  // ID 7: bytes [196, 242] = 0xF2C4
            0xDAFE,  // ID 8: bytes [254, 218] = 0xDAFE
            0x56CF,  // ID 9: bytes [207, 86] = 0x56CF
            0x91F9,  // ID 10: bytes [249, 145] = 0x91F9
            0xA711,  // ID 11: bytes [17, 167] = 0xA711
            0xB70E,  // ID 12: bytes [14, 183] = 0xB70E
            0x0F2A,  // ID 13: bytes [42, 15] = 0x0F2A
            0xB124,  // ID 14: bytes [36, 177] = 0xB124
            0x3E26,  // ID 15: bytes [38, 62] = 0x3E26
            0x6546,  // ID 16: bytes [70, 101] = 0x6546
            0x0066,  // ID 17: bytes [102, 0] = 0x0066
            0x5E6C,  // ID 18: bytes [108, 94] = 0x5E6C
            0xAF76,  // ID 19: bytes [118, 175] = 0xAF76
            0x8B86,  // ID 20: bytes [134, 139] = 0x8B86
            0x2BB0,  // ID 21: bytes [176, 43] = 0x2BB0
            0xD5CC,  // ID 22: bytes [204, 213] = 0xD5CC
            0x82DD,  // ID 23: bytes [221, 130] = 0x82DD
            0x47FE,  // ID 24: bytes [254, 71] = 0x47FE
            0x7194,  // ID 25: bytes [148, 113] = 0x7194
            0xE4AC,  // ID 26: bytes [172, 228] = 0xE4AC
            0x54A5,  // ID 27: bytes [165, 84] = 0x54A5
            0x2321,  // ID 28: bytes [33, 35] = 0x2321
            0x6F34,  // ID 29: bytes [52, 111] = 0x6F34
            0x1544,  // ID 30: bytes [68, 21] = 0x1544
            0xB257,  // ID 31: bytes [87, 178] = 0xB257
            0xCF9E,  // ID 32: bytes [158, 207] = 0xCF9E
            0xCBF0,  // ID 33: bytes [240, 203] = 0xCBF0
            0xAE08,  // ID 34: bytes [8, 174] = 0xAE08
            0x2909,  // ID 35: bytes [9, 41] = 0x2909
            0x7518,  // ID 36: bytes [24, 117] = 0x7518
            0xFF04,  // ID 37: bytes [4, 255] = 0xFF04
            0xF60D,  // ID 38: bytes [13, 246] = 0xF60D
            0x5A1C,  // ID 39: bytes [28, 90] = 0x5A1C
            0x1817,  // ID 40: bytes [23, 24] = 0x1817
            0x282A,  // ID 41: bytes [42, 40] = 0x282A
            0x8C32,  // ID 42: bytes [50, 140] = 0x8C32
            0xB238,  // ID 43: bytes [56, 178] = 0xB238
            0xE824,  // ID 44: bytes [36, 232] = 0xE824
            0xEB2E,  // ID 45: bytes [46, 235] = 0xEB2E
            0x3F2D,  // ID 46: bytes [45, 63] = 0x3F2D
            0x644B,  // ID 47: bytes [75, 100] = 0x644B
            0x2E50,  // ID 48: bytes [80, 46] = 0x2E50
            0x1350   // ID 49: bytes [80, 19] = 0x1350
        ];
        
        // Adiciona o dicionário à biblioteca
        function adicionarDicionario() {
            if (typeof AR === 'undefined') {
                console.error('AR não carregado');
                return false;
            }
            
            // Formata os códigos no formato que a biblioteca espera
            const codeList = CODIGOS_DO_SEU_ARQUIVO.map(code => '0x' + code.toString(16).toUpperCase().padStart(8, '0') + 'UL');
            
            AR.DICTIONARIES.DICT_4X4_FROM_YOUR_FILE = {
                nBits: 16,
                tau: 1,
                codeList: codeList
            };
            
            console.log('✅ Dicionário 4x4 extraído do seu arquivo!');
            console.log('Código do ID 0:', CODIGOS_DO_SEU_ARQUIVO[0].toString(16));
            console.log('Código do ID 1 (SEU MARCADOR):', CODIGOS_DO_SEU_ARQUIVO[1].toString(16));
            
            return true;
        }
        
        // ==========================================
        // DETECTOR E CÂMERA
        // ==========================================
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        
        canvas.width = 640;
        canvas.height = 480;
        
        let detector = null;
        let animationId = null;
        let cameraAtiva = false;
        
        function inicializarDetector() {
            if (typeof AR === 'undefined') {
                statusDiv.innerHTML = '❌ Aguardando biblioteca aruco.js...';
                setTimeout(inicializarDetector, 500);
                return false;
            }
            
            try {
                adicionarDicionario();
                detector = new AR.Detector({ dictionaryName: 'DICT_4X4_FROM_YOUR_FILE' });
                statusDiv.innerHTML = '✅ Detector 4x4 pronto! Usando dados do seu arquivo.';
                return true;
            } catch(e) {
                console.error(e);
                statusDiv.innerHTML = `❌ Erro: ${e.message}`;
                return false;
            }
        }
        
        function detectar() {
            if (!cameraAtiva || !video.videoWidth || !detector) {
                if (cameraAtiva) {
                    animationId = requestAnimationFrame(detectar);
                }
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    statusDiv.innerHTML = `✅✅✅ DETECTADO! ID: ${markers[0].id} ✅✅✅`;
                    statusDiv.className = 'status detected';
                    
                    const corners = markers[0].corners;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) {
                        ctx.lineTo(corners[i].x, corners[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 22px system-ui';
                    ctx.fillText(`ID: ${markers[0].id}`, corners[0].x, corners[0].y - 10);
                } else {
                    statusDiv.innerHTML = '🔍 Procurando marcador 4x4 ID 1... (código 0x9A0F do seu arquivo)';
                    statusDiv.className = 'status';
                }
            } catch(e) {
                console.error(e);
            }
            
            animationId = requestAnimationFrame(detectar);
        }
        
        async function ativarCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            
            statusDiv.innerHTML = '📷 Solicitando permissão da câmera...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraAtiva = true;
                    statusDiv.innerHTML = '📷 Câmera ativa! Procurando marcador 4x4...';
                    if (!animationId) detectar();
                };
            } catch(err) {
                let msg = err.name === 'NotAllowedError' 
                    ? 'Permissão negada. Vá em Configurações e permita a câmera.' 
                    : err.message;
                statusDiv.innerHTML = `❌ ${msg}`;
            }
        }
        
        btnCamera.addEventListener('click', ativarCamera);
        inicializarDetector();
        
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
