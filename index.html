<!DOCTYPE html>
<html>
<head>
    <title>ArUco 4x4</title>
    <script src="aruco.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: system-ui; margin: 0; padding: 16px; background: #000; color: white; text-align: center; }
        video, canvas { width: 100%; max-width: 640px; border-radius: 12px; margin: 8px auto; display: block; background: #111; }
        button { background: #007aff; color: white; border: none; padding: 14px 28px; font-size: 18px; border-radius: 40px; margin: 16px; cursor: pointer; }
        .status { background: #222; padding: 12px; border-radius: 12px; margin: 12px; font-family: monospace; }
        .detected { background: #1a472a; color: #7fff7f; }
    </style>
</head>
<body>
    <h2>🎯 ArUco 4x4</h2>
    <button id="btnCamera">📷 ATIVAR CÂMERA</button>
    <video id="video" autoplay playsinline muted style="display: none;"></video>
    <canvas id="canvas"></canvas>
    <div class="status" id="status">⏳ Carregando aruco.js...</div>

    <script>
        function iniciar() {
            if (typeof ARUCO === 'undefined') {
                document.getElementById('status').innerHTML = '❌ aruco.js não carregou. Verifique o arquivo.';
                return;
            }
            
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const statusDiv = document.getElementById('status');
            const btnCamera = document.getElementById('btnCamera');
            
            canvas.width = 640;
            canvas.height = 480;
            
            let detector = null;
            let cameraAtiva = false;
            
            try {
                const dict = new ARUCO.Dictionary(ARUCO.DICT_4X4_1000);
                detector = new ARUCO.Detector(dict);
                statusDiv.innerHTML = '✅ Pronto. Clique em ATIVAR CÂMERA';
            } catch(e) {
                statusDiv.innerHTML = '❌ Erro: ' + e.message;
                return;
            }
            
            function detectar() {
                if (!cameraAtiva || !video.videoWidth) {
                    requestAnimationFrame(detectar);
                    return;
                }
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    statusDiv.innerHTML = '✅✅✅ DETECTADO! ID: ' + markers[0].id;
                    statusDiv.className = 'status detected';
                    
                    const corners = markers[0].corners;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 22px system-ui';
                    ctx.fillText('ID: ' + markers[0].id, corners[0].x, corners[0].y - 10);
                } else {
                    statusDiv.innerHTML = '🔍 Procurando marcador 4x4 ID 1...';
                    statusDiv.className = 'status';
                }
                
                requestAnimationFrame(detectar);
            }
            
            async function ativarCamera() {
                if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                statusDiv.innerHTML = '📷 Solicitando câmera...';
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = stream;
                    video.style.display = "block";
                    video.onloadedmetadata = () => {
                        video.play();
                        cameraAtiva = true;
                        detectar();
                    };
                } catch(err) {
                    statusDiv.innerHTML = '❌ Erro câmera: ' + err.message;
                }
            }
            
            btnCamera.addEventListener('click', ativarCamera);
        }
        
        // Aguarda o aruco.js carregar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciar);
        } else {
            iniciar();
        }
    </script>
</body>
</html>
