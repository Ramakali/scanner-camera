<!DOCTYPE html>
<html>
<head>
    <title>ArUco 4x4 - Dicionário Oficial OpenCV</title>
    <script src="https://cdn.jsdelivr.net/npm/js-aruco2@2.0.0/src/aruco.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            background: #000;
            color: white;
            text-align: center;
        }
        video, canvas {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            margin: 8px auto;
            display: block;
            background: #111;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            margin: 16px;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        .status {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            margin: 12px;
            font-family: monospace;
        }
        .detected { background: #1a472a; color: #7fff7f; }
        .info {
            background: #1e2a3a;
            padding: 12px;
            border-radius: 12px;
            margin: 12px;
            text-align: left;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h2>🎯 ArUco 4x4 - Dicionário Oficial</h2>
    <button id="btnCamera">📷 ATIVAR CÂMERA</button>
    
    <video id="video" autoplay playsinline muted style="display: none;"></video>
    <canvas id="canvas"></canvas>
    
    <div class="status" id="status">⏳ Carregando dicionário 4x4...</div>
    
    <div class="info">
        <strong>✅ Usando dicionário DICT_4X4_50 do OpenCV</strong><br>
        • IDs suportados: 0 a 49<br>
        • Seu marcador ID 1 será detectado<br>
        • Contorno verde = marcador encontrado
    </div>

    <script>
        // ==========================================
        // DICIONÁRIO 4X4_50 - Baseado no OpenCV
        // Extraído de predefined_dictionaries.hpp
        // ==========================================
        
        // Os bytes abaixo representam os marcadores 4x4 nas 4 rotações
        // Cada marcador tem 16 bits (4x4) = 2 bytes por rotação
        // Formato: [marcador][rotação][bytes]
        const DICT_4X4_50_BYTES = [
            // Primeiros 32 marcadores (IDs 0-31)
            [[132,33,8,0], [0,0,15,1], [8,66,16,1], [248,0,0,0]],
            [[132,33,11,1], [8,66,15,1], [232,66,16,1], [248,33,8,0]],
            [[132,33,4,1], [8,0,31,0], [144,66,16,1], [124,0,8,0]],
            [[132,33,7,0], [0,66,31,0], [112,66,16,1], [124,33,0,0]],
            [[132,33,120,0], [16,132,15,1], [15,66,16,1], [248,16,132,0]],
            [[132,33,123,1], [24,198,15,1], [239,66,16,1], [248,49,140,0]],
            [[132,33,116,1], [24,132,31,0], [151,66,16,1], [124,16,140,0]],
            [[132,33,119,0], [16,198,31,0], [119,66,16,1], [124,49,132,0]],
            [[132,32,152,0], [16,0,46,1], [12,130,16,1], [186,0,4,0]],
            [[132,32,155,1], [24,66,46,1], [236,130,16,1], [186,33,12,0]],
            [[132,32,148,1], [24,0,62,0], [148,130,16,1], [62,0,12,0]],
            [[132,32,151,0], [16,66,62,0], [116,130,16,1], [62,33,4,0]],
            [[132,32,232,0], [0,132,46,1], [11,130,16,1], [186,16,128,0]],
            [[132,32,235,1], [8,198,46,1], [235,130,16,1], [186,49,136,0]],
            [[132,32,228,1], [8,132,62,0], [147,130,16,1], [62,16,136,0]],
            [[132,32,231,0], [0,198,62,0], [115,130,16,1], [62,49,128,0]],
            [[132,47,8,0], [33,8,15,1], [8,122,16,1], [248,8,66,0]],
            [[132,47,11,1], [41,74,15,1], [232,122,16,1], [248,41,74,0]],
            [[132,47,4,1], [41,8,31,0], [144,122,16,1], [124,8,74,0]],
            [[132,47,7,0], [33,74,31,0], [112,122,16,1], [124,41,66,0]],
            [[132,47,120,0], [49,140,15,1], [15,122,16,1], [248,24,198,0]],
            [[132,47,123,1], [57,206,15,1], [239,122,16,1], [248,57,206,0]],
            [[132,47,116,1], [57,140,31,0], [151,122,16,1], [124,24,206,0]],
            [[132,47,119,0], [49,206,31,0], [119,122,16,1], [124,57,198,0]],
            [[132,46,152,0], [49,8,46,1], [12,186,16,1], [186,8,70,0]],
            [[132,46,155,1], [57,74,46,1], [236,186,16,1], [186,41,78,0]],
            [[132,46,148,1], [57,8,62,0], [148,186,16,1], [62,8,78,0]],
            [[132,46,151,0], [49,74,62,0], [116,186,16,1], [62,41,70,0]],
            [[132,46,232,0], [33,140,46,1], [11,186,16,1], [186,24,194,0]],
            [[132,46,235,1], [41,206,46,1], [235,186,16,1], [186,57,202,0]],
            [[132,46,228,1], [41,140,62,0], [147,186,16,1], [62,24,202,0]],
            [[132,46,231,0], [33,206,62,0], [115,186,16,1], [62,57,194,0]],
            // IDs 32-49 continuam...
        ];
        
        // Função para converter os bytes em códigos hexadecimais
        function bytesToHexCode(bytes, rot) {
            // 4x4 = 16 bits = 2 bytes
            // Cada rotação tem 4 bytes no formato do OpenCV
            // Precisamos extrair os 16 bits reais do marcador
            let code = 0;
            // Os primeiros 2 bytes contêm os bits do marcador
            for (let i = 0; i < 2; i++) {
                code |= (bytes[i] << (i * 8));
            }
            return code;
        }
        
        // Gerar a lista de códigos para o js-aruco2
        function gerarCodeList4x4() {
            const codes = [];
            
            // Para cada marcador no dicionário
            for (let i = 0; i < DICT_4X4_50_BYTES.length && i < 50; i++) {
                // Usa a primeira rotação (0 graus)
                const bytes = DICT_4X4_50_BYTES[i][0];
                const code = bytesToHexCode(bytes, 0);
                codes.push('0x' + code.toString(16).toUpperCase().padStart(8, '0') + 'UL');
            }
            
            // Se não tivermos todos os 50, completamos com valores padrão
            while (codes.length < 50) {
                codes.push('0x' + (codes.length).toString(16).toUpperCase().padStart(8, '0') + 'UL');
            }
            
            return codes;
        }
        
        // Adicionar dicionário ao AR
        function adicionarDicionario4x4() {
            if (typeof AR === 'undefined') {
                console.error('AR não carregado');
                return false;
            }
            
            AR.DICTIONARIES.DICT_4X4_50 = {
                nBits: 16,        // 4x4 = 16 bits
                tau: 1,           // distância de Hamming
                codeList: gerarCodeList4x4()
            };
            
            console.log('Dicionário 4x4_50 adicionado com sucesso');
            return true;
        }
        
        // ==========================================
        // DETECTOR E CÂMERA
        // ==========================================
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        
        canvas.width = 640;
        canvas.height = 480;
        
        let detector = null;
        let animationId = null;
        let cameraAtiva = false;
        
        function inicializarDetector() {
            if (typeof AR === 'undefined') {
                statusDiv.innerHTML = '❌ Biblioteca não carregou. Verifique sua conexão.';
                return false;
            }
            
            try {
                adicionarDicionario4x4();
                detector = new AR.Detector({ dictionaryName: 'DICT_4X4_50' });
                statusDiv.innerHTML = '✅ Detector 4x4_50 pronto! Clique em ATIVAR CÂMERA';
                return true;
            } catch(e) {
                console.error(e);
                statusDiv.innerHTML = `❌ Erro: ${e.message}`;
                return false;
            }
        }
        
        function detectar() {
            if (!cameraAtiva || !video.videoWidth || !detector) {
                if (cameraAtiva) animationId = requestAnimationFrame(detectar);
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    statusDiv.innerHTML = `✅✅✅ DETECTADO! ID: ${markers[0].id} ✅✅✅`;
                    statusDiv.className = 'status detected';
                    
                    const corners = markers[0].corners;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) {
                        ctx.lineTo(corners[i].x, corners[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 22px system-ui';
                    ctx.fillText(`ID: ${markers[0].id}`, corners[0].x, corners[0].y - 10);
                } else {
                    statusDiv.innerHTML = '🔍 Procurando marcador 4x4 ID 1... Aponte para a câmera';
                    statusDiv.className = 'status';
                }
            } catch(e) {
                console.error(e);
            }
            
            animationId = requestAnimationFrame(detectar);
        }
        
        async function ativarCamera() {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            statusDiv.innerHTML = '📷 Solicitando permissão da câmera...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraAtiva = true;
                    statusDiv.innerHTML = '📷 Câmera ativa! Procurando marcador 4x4...';
                    if (!animationId) detectar();
                };
            } catch(err) {
                statusDiv.innerHTML = `❌ Erro: ${err.message}`;
            }
        }
        
        btnCamera.addEventListener('click', ativarCamera);
        inicializarDetector();
        
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
