<!DOCTYPE html>
<html>
<head>
    <title>ArUco - Teste com ambos dicionários</title>
    <script src="aruco.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
            background: #000;
            color: white;
            text-align: center;
        }
        .container { max-width: 700px; margin: 0 auto; }
        video, canvas {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            margin: 8px auto;
            display: block;
            background: #111;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            margin: 16px;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); background: #0051d5; }
        .status-box {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 14px;
        }
        .detected { background: #1a472a; color: #7fff7f; }
        .info { background: #1e2a3a; text-align: left; font-size: 13px; }
        .switch-btn {
            background: #5856d6;
            padding: 8px 16px;
            font-size: 14px;
            margin: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎯 ArUco Detector</h2>
        <button id="btnCamera">📷 ATIVAR CÂMERA</button>
        
        <video id="video" autoplay playsinline muted style="display: none;"></video>
        <canvas id="canvas"></canvas>
        
        <div class="status-box" id="status">
            ⚠️ Clique no botão para ativar a câmera
        </div>
        
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button id="btnDict1" class="switch-btn" style="background: #007aff;">🔘 Usar ARUCO_MIP_36h12</button>
            <button id="btnDict2" class="switch-btn" style="background: #ff9f0a;">🔘 Usar ARUCO</button>
        </div>
        
        <div class="info info-box">
            <strong>💡 Dica importante:</strong><br>
            • <strong>ARUCO_MIP_36h12</strong> (padrão) → 8x8 células, 250 marcadores<br>
            • <strong>ARUCO</strong> → 7x7 células, 1023 marcadores<br><br>
            Se seu marcador foi criado com um gerador online, tente os dois botões acima!
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        const btnDict1 = document.getElementById('btnDict1');
        const btnDict2 = document.getElementById('btnDict2');
        
        canvas.width = 640;
        canvas.height = 480;
        
        let detector = null;
        let animationId = null;
        let cameraActive = false;
        let currentDictionary = 'ARUCO_MIP_36h12';  // padrão da biblioteca
        
        // Função para criar detector com o dicionário atual
        function createDetector() {
            try {
                if (currentDictionary === 'ARUCO_MIP_36h12') {
                    detector = new AR.Detector();  // padrão é ARUCO_MIP_36h12
                    console.log('Detector criado com ARUCO_MIP_36h12 (padrão)');
                } else {
                    detector = new AR.Detector({ dictionaryName: 'ARUCO' });
                    console.log('Detector criado com ARUCO');
                }
                return true;
            } catch(e) {
                console.error('Erro ao criar detector:', e);
                statusDiv.innerHTML = `❌ Erro: ${e.message}`;
                return false;
            }
        }
        
        // Inicializa detector
        if (typeof AR !== 'undefined') {
            createDetector();
            statusDiv.innerHTML = `✅ Biblioteca carregada! Usando: ${currentDictionary}`;
        } else {
            statusDiv.innerHTML = '❌ ERRO: aruco.js não carregou';
        }
        
        // Troca para ARUCO_MIP_36h12
        btnDict1.addEventListener('click', () => {
            currentDictionary = 'ARUCO_MIP_36h12';
            createDetector();
            statusDiv.innerHTML = `🔄 Dicionário alterado para: ${currentDictionary}<br>Aponte o marcador novamente`;
            statusDiv.style.background = '#ff8c00';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('Dicionário alterado')) {
                    statusDiv.style.background = '#222';
                }
            }, 2000);
        });
        
        // Troca para ARUCO
        btnDict2.addEventListener('click', () => {
            currentDictionary = 'ARUCO';
            createDetector();
            statusDiv.innerHTML = `🔄 Dicionário alterado para: ${currentDictionary}<br>Aponte o marcador novamente`;
            statusDiv.style.background = '#ff8c00';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('Dicionário alterado')) {
                    statusDiv.style.background = '#222';
                }
            }, 2000);
        });
        
        // Loop de detecção
        function detectMarkers() {
            if (!cameraActive || !video.videoWidth || !detector) {
                animationId = requestAnimationFrame(detectMarkers);
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    // DETECTOU!
                    statusDiv.innerHTML = `✅✅✅ DETECTADO! ID: ${markers[0].id} | Dicionário: ${currentDictionary} ✅✅✅`;
                    statusDiv.style.background = '#1a472a';
                    statusDiv.style.color = '#7fff7f';
                    
                    // Desenha contorno
                    const corners = markers[0].corners;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) {
                        ctx.lineTo(corners[i].x, corners[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 24px system-ui';
                    ctx.shadowBlur = 0;
                    ctx.fillText(`ID: ${markers[0].id}`, corners[0].x, corners[0].y - 15);
                } else {
                    statusDiv.innerHTML = `🔍 Procurando marcador... Usando: ${currentDictionary}<br>Aponte para o marcador e tente os dois botões acima`;
                    statusDiv.style.background = '#222';
                    statusDiv.style.color = '#ccc';
                }
            } catch(e) {
                console.error('Erro:', e);
            }
            
            animationId = requestAnimationFrame(detectMarkers);
        }
        
        // Ativa câmera
        async function activateCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            
            statusDiv.innerHTML = '📷 Solicitando permissão...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraActive = true;
                    statusDiv.innerHTML = `📷 Câmera ativa! Usando: ${currentDictionary}<br>Teste os botões azul e laranja se não detectar`;
                    if (!animationId) detectMarkers();
                };
            } catch(err) {
                statusDiv.innerHTML = `❌ Erro câmera: ${err.message}`;
            }
        }
        
        btnCamera.addEventListener('click', activateCamera);
        
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
