<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector ArUco Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; margin: 0; padding: 20px; }
        #container { position: relative; width: 100%; max-width: 500px; }
        video, canvas { width: 100%; border-radius: 8px; display: block; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        button { padding: 12px 24px; font-size: 16px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 10px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>Detector ArUco (Foto)</h2>
    
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <div class="controls">
        <button id="captureBtn" disabled>Capturar e Detectar</button>
    </div>

    <div id="status">Carregando OpenCV.js...</div>

   
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvasOutput');
        const captureBtn = document.getElementById('captureBtn');
        const status = document.getElementById('status');

        function onOpenCvReady() {
            status.innerText = 'OpenCV pronto. Iniciando câmera...';
            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } }, // Força câmera traseira
                    audio: false 
                });
                video.srcObject = stream;
                captureBtn.disabled = false;
                status.innerText = 'Câmera traseira ativa.';
            } catch (err) {
                console.error("Erro ao acessar câmera traseira:", err);
                // Fallback para qualquer câmera disponível caso a 'exact environment' falhe
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                captureBtn.disabled = false;
                status.innerText = 'Usando câmera padrão (Traseira não forçada).';
            }
        }

        captureBtn.addEventListener('click', () => {
            detectArUco();
        });

        // Substitua a função detectArUco por esta versão com tratamento de erro:
        function detectArUco() {
            try {
                if (!cv || !cv.Mat) {
                    status.innerText = "Aguardando OpenCV...";
                    return;
                }
        
                // 1. Preparação do Canvas e Matriz
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = video.videoWidth;
                tempCanvas.height = video.videoHeight;
                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        
                let src = cv.imread(tempCanvas);
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
        
                // 2. Acesso seguro ao dicionário e parâmetros
                // Tentamos o padrão cv.aruco_... que é o mais comum em JS
                let dictionary, detectorParameters;
                
                try {
                    // Tenta o formato: cv.getPredefinedDictionary
                    dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
                    detectorParameters = new cv.DetectorParameters();
                } catch (e) {
                    // Se falhar, tenta o formato: cv.aruco_getPredefinedDictionary
                    console.log("Tentando fallback para prefixo aruco_");
                    dictionary = cv.aruco_getPredefinedDictionary(cv.DICT_4X4_50);
                    detectorParameters = new cv.aruco_DetectorParameters();
                }
        
                let markerCorners = new cv.MatVector();
                let markerIds = new cv.Mat();
        
                // 3. Execução da Detecção
                // Novamente, tenta com e sem o prefixo 'aruco_'
                if (typeof cv.detectMarkers !== "undefined") {
                    cv.detectMarkers(src, dictionary, markerCorners, markerIds, detectorParameters);
                } else {
                    cv.aruco_detectMarkers(src, dictionary, markerCorners, markerIds, detectorParameters);
                }
        
                if (markerIds.rows > 0) {
                    status.innerText = `ID Detectado: ${markerIds.data32S[0]}`;
                    
                    // Desenha o marcador (ajusta se a função de desenho também tiver prefixo)
                    try {
                        cv.drawDetectedMarkers(src, markerCorners, markerIds);
                    } catch(e) {
                        cv.aruco_drawDetectedMarkers(src, markerCorners, markerIds);
                    }
                    
                    cv.imshow('canvasOutput', src);
                } else {
                    status.innerText = "Nenhum marcador 4x4 encontrado nesta foto.";
                    cv.imshow('canvasOutput', src);
                }
        
                // Limpeza de memória
                src.delete(); markerCorners.delete(); markerIds.delete();
                
            } catch (err) {
                console.error("Erro detalhado:", err);
                status.innerText = "Erro de compatibilidade: " + err.message;
            }
        }
    </script>
</body>
</html>
