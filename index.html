<!DOCTYPE html>
<html>
<head>
    <title>ArUco Funcional</title>
    <!-- Referência LOCAL (não depende de internet) -->
    <script src="aruco.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        video, canvas { border: 2px solid #333; margin: 10px; max-width: 90%; }
        button { padding: 12px 24px; font-size: 16px; margin: 10px; cursor: pointer; background: #007aff; color: white; border: none; border-radius: 8px; }
        #status { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>🎯 Detector ArUco</h2>
    <button id="btnCamera">📷 Ativar Câmera</button>
    
    <div>
        <video id="video" width="640" height="480" autoplay playsinline muted style="display: none;"></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>
    
    <div id="status">⚠️ Clique em "Ativar Câmera" e aponte para o marcador</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        
        let detector = null;
        let animationId = null;
        let cameraActive = false;
        
        // VERIFICA SE A BIBLIOTECA CARREGOU
        if (typeof AR === 'undefined') {
            statusDiv.innerHTML = '❌ ERRO: Biblioteca aruco.js não carregou. Verifique se o arquivo está na mesma pasta.';
            statusDiv.style.background = '#f8d7da';
        } else {
            statusDiv.innerHTML = '✅ Biblioteca carregada! Clique em "Ativar Câmera".';
            // Cria o detector ANTES de ativar a câmera
            detector = new AR.Detector();
            console.log('Detector criado com sucesso');
        }
        
        // Processa cada frame
        function processFrame() {
            if (!cameraActive || !video.videoWidth) {
                if (cameraActive) animationId = requestAnimationFrame(processFrame);
                return;
            }
            
            // Desenha o vídeo no canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                // Pega os dados da imagem
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // TENTA DETECTAR
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    statusDiv.innerHTML = `✅ Detectado! ID: ${markers[0].id}`;
                    statusDiv.style.background = '#d4edda';
                    
                    // Desenha contorno vermelho
                    const corners = markers[0].corners;
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) {
                        ctx.lineTo(corners[i].x, corners[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    // Escreve o ID
                    ctx.fillStyle = 'red';
                    ctx.font = 'bold 20px Arial';
                    ctx.fillText(`ID: ${markers[0].id}`, corners[0].x, corners[0].y - 10);
                } else {
                    statusDiv.innerHTML = '🔍 Procurando marcador... Aponte a câmera para o marcador ArUco';
                    statusDiv.style.background = '#e3f2fd';
                }
            } catch (e) {
                console.error('Erro na detecção:', e);
            }
            
            animationId = requestAnimationFrame(processFrame);
        }
        
        // Ativa a câmera
        async function startCamera() {
            statusDiv.innerHTML = '⏳ Solicitando permissão da câmera...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraActive = true;
                    statusDiv.innerHTML = '📷 Câmera ativa! Processando...';
                    processFrame();
                };
            } catch (err) {
                statusDiv.innerHTML = `❌ Erro ao acessar câmera: ${err.message}`;
                statusDiv.style.background = '#f8d7da';
                console.error(err);
            }
        }
        
        btnCamera.addEventListener('click', startCamera);
        
        // Para a câmera ao sair da página
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
