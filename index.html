<!DOCTYPE html>
<html>
<head>
    <title>ArUco 4x4 - Funcional</title>
    <!-- URL CORRETA da biblioteca aruco-js -->
    <script src="https://raw.githubusercontent.com/okalachev/aruco-js/master/aruco.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            background: #000;
            color: white;
            text-align: center;
        }
        video, canvas {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            margin: 8px auto;
            display: block;
            background: #111;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            margin: 16px;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        .status {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            margin: 12px;
            font-family: monospace;
        }
        .detected { background: #1a472a; color: #7fff7f; }
        .info { background: #1e2a3a; padding: 12px; border-radius: 12px; margin: 12px; text-align: left; font-size: 13px; }
    </style>
</head>
<body>
    <h2>🎯 Detector ArUco 4x4</h2>
    <button id="btnCamera">📷 ATIVAR CÂMERA</button>
    
    <video id="video" autoplay playsinline muted style="display: none;"></video>
    <canvas id="canvas"></canvas>
    
    <div class="status" id="status">⏳ Carregando biblioteca...</div>
    
    <div class="info">
        ✅ Usando biblioteca aruco-js com suporte nativo a 4x4 [citation:3]<br>
        📌 Seu marcador 4x4 ID 1 será detectado<br>
        🟢 Contorno verde = sucesso<br>
        📐 4x4 significa 4x4 células internas (mais borda preta externa)
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        
        canvas.width = 640;
        canvas.height = 480;
        
        let detector = null;
        let animationId = null;
        let cameraAtiva = false;
        
        // Aguarda a biblioteca carregar
        function aguardarBiblioteca() {
            return new Promise((resolve, reject) => {
                let tentativas = 0;
                const intervalo = setInterval(() => {
                    tentativas++;
                    
                    // Verifica se a biblioteca carregou (ARUCO global ou AR)
                    if (typeof ARUCO !== 'undefined' || typeof ArUco !== 'undefined') {
                        clearInterval(intervalo);
                        console.log('Biblioteca carregada!');
                        resolve(true);
                    } else if (tentativas > 50) { // 10 segundos
                        clearInterval(intervalo);
                        reject('Timeout: biblioteca não carregou');
                    }
                }, 200);
            });
        }
        
        // Inicializa o detector com dicionário 4x4_1000 [citation:3]
        function inicializarDetector() {
            try {
                // aruco-js usa ARUCO global
                const dict = new ARUCO.Dictionary(ARUCO.DICT_4X4_1000);
                detector = new ARUCO.Detector(dict);
                console.log('Detector 4x4 criado com sucesso');
                return true;
            } catch(e) {
                console.error('Erro ao criar detector:', e);
                statusDiv.innerHTML = `❌ Erro: ${e.message}`;
                return false;
            }
        }
        
        // Loop de detecção
        function detectar() {
            if (!cameraAtiva || !video.videoWidth || !detector) {
                if (cameraAtiva) {
                    animationId = requestAnimationFrame(detectar);
                }
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    statusDiv.innerHTML = `✅✅✅ MARCADOR DETECTADO! ID: ${markers[0].id} ✅✅✅`;
                    statusDiv.className = 'status detected';
                    
                    const corners = markers[0].corners;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) {
                        ctx.lineTo(corners[i].x, corners[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 22px system-ui';
                    ctx.fillText(`ID: ${markers[0].id}`, corners[0].x, corners[0].y - 10);
                } else {
                    statusDiv.innerHTML = '🔍 Procurando marcador 4x4... Aponte seu ID 1 para a câmera';
                    statusDiv.className = 'status';
                }
            } catch(e) {
                console.error('Erro detecção:', e);
            }
            
            animationId = requestAnimationFrame(detectar);
        }
        
        // Ativar câmera
        async function ativarCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            
            statusDiv.innerHTML = '📷 Solicitando permissão da câmera...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraAtiva = true;
                    statusDiv.innerHTML = '📷 Câmera ativa! Aguardando detecção...';
                    
                    if (!animationId) detectar();
                };
            } catch(err) {
                console.error('Erro câmera:', err);
                let msg = err.name === 'NotAllowedError' ? 
                    'Permissão negada. Vá em Configurações e permita a câmera.' : 
                    err.message;
                statusDiv.innerHTML = `❌ ${msg}`;
            }
        }
        
        // INÍCIO: carrega biblioteca e inicializa
        aguardarBiblioteca().then(() => {
            statusDiv.innerHTML = '✅ Biblioteca carregada! Clique em ATIVAR CÂMERA';
            inicializarDetector();
        }).catch((err) => {
            statusDiv.innerHTML = `❌ Biblioteca não carregou. ${err}<br><br>💡 Solução: Baixe o arquivo aruco.js manualmente do GitHub e coloque na mesma pasta.`;
        });
        
        btnCamera.addEventListener('click', ativarCamera);
        
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
