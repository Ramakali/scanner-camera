<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const btn = document.getElementById('btn');
const status = document.getElementById('status');
const dim = document.getElementById('dim');

let mode = "scanner";
let latestMeasurement = null;

let detector = null;

// ================= TAB =================
function setTab(tab) {
  mode = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}

// ================= OpenCV =================
cv['onRuntimeInitialized'] = () => {

  // 🔥 CRIA DETECTOR ARUCO CORRETO
  if (cv.ArucoDetector) {
    let dictionary = cv.getPredefinedDictionary(cv.DICT_4X4_50);
    let parameters = new cv.DetectorParameters();
    detector = new cv.ArucoDetector(dictionary, parameters);

    status.innerText = "OpenCV + ArUco OK";
  } else {
    status.innerText = "ERRO: OpenCV sem ArUco";
  }

  startCamera();
};

// ================= CAMERA =================
async function startCamera() {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }
    });
    video.srcObject = stream;
  } catch {
    let stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  }
}

// ================= LOOP =================
video.addEventListener("playing", () => {
  requestAnimationFrame(processFrame);
});

// ================= FRAME =================
function processFrame() {

  try {

    if (video.videoWidth === 0) {
      requestAnimationFrame(processFrame);
      return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let src = cv.imread(canvas);

    let corners = new cv.MatVector();
    let ids = new cv.Mat();

    // ===== ARUCO DETECÇÃO =====
    if (detector) {

      detector.detectMarkers(src, corners, ids);

      if (ids.rows > 0) {

        cv.drawDetectedMarkers(src, corners, ids);

        let arr = [];
        for (let i = 0; i < ids.rows; i++) {
          arr.push(ids.data32S[i]);
        }

        status.innerText = "ArUco: " + arr.join(",");

      } else {
        status.innerText = "Sem ArUco";
      }

    } else {
      status.innerText = "Aruco não disponível";
    }

    cv.imshow('canvas', src);

    src.delete();
    corners.delete();
    ids.delete();

  } catch (err) {
    console.error(err);
    status.innerText = "Erro: " + err;
  }

  requestAnimationFrame(processFrame);
}

// ================= CAPTURE =================
btn.onclick = () => {
  if (latestMeasurement) {
    dim.innerText = `Capturado: ${latestMeasurement.wMm} x ${latestMeasurement.hMm}`;
  } else {
    alert("Nenhuma medida disponível ainda");
  }
};
</script>
