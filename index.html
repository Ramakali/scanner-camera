        • Nenhum código inventado - todos vêm do seu arquivo

            // ID 48
            { bytes: [80, 46], rot1: [131, 145], rot2: [116, 10], rot3: [137, 193] },
            // ID 49
            { bytes: [80, 19], rot1: [177, 128], rot2: [200, 10], rot3: [1, 141] }

        // Converte os bytes (little-endian) para um número inteiro de 16 bits
        function bytesToCode(byte1, byte2) {
            // O formato no OpenCV é little-endian: byte1 é o byte menos significativo
            return (byte2 << 8) | byte1;
        }
        
        // Gera a lista de códigos para o dicionário 4x4
        function gerarCodeList4x4() {
            const codes = [];
            
            for (let i = 0; i < DICT_4X4_1000_BYTES.length; i++) {
                const marcador = DICT_4X4_1000_BYTES[i];
                // Usa a primeira rotação (0 graus)
                const code = bytesToCode(marcador.bytes[0], marcador.bytes[1]);
                codes.push(code);
            }
            
            // Para IDs acima de 49 (se necessário), usa os bytes do arquivo
            // (mas seu ID 1 está nos primeiros)
            
            return codes;
        }
        
        // Adiciona o dicionário à biblioteca
        function adicionarDicionario() {
            if (typeof AR === 'undefined') {
                console.error('AR não carregado');
                return false;
            }
            
            const codes = gerarCodeList4x4();
            
            AR.DICTIONARIES.DICT_4X4_FROM_YOUR_FILE = {
                nBits: 16,
                tau: 1,
                codeList: codes.map(c => '0x' + c.toString(16).toUpperCase().padStart(8, '0') + 'UL')
            };
            
            console.log('Dicionário 4x4 extraído do seu arquivo!');
            console.log('Código do ID 0:', codes[0].toString(16));
            console.log('Código do ID 1:', codes[1].toString(16));
            console.log('Código do ID 2:', codes[2].toString(16));
            
            return true;
        }
        
        // ==========================================
        // DETECTOR E CÂMERA
        // ==========================================
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btnCamera = document.getElementById('btnCamera');
        
        canvas.width = 640;
        canvas.height = 480;
        
        let detector = null;
        let animationId = null;
        let cameraAtiva = false;
        
        function inicializarDetector() {
            if (typeof AR === 'undefined') {
                statusDiv.innerHTML = '❌ Aguardando biblioteca...';
                setTimeout(inicializarDetector, 500);
                return false;
            }
            
            try {
                adicionarDicionario();
                detector = new AR.Detector({ dictionaryName: 'DICT_4X4_FROM_YOUR_FILE' });
                statusDiv.innerHTML = '✅ Detector 4x4 pronto! Usando dados do seu arquivo.';
                return true;
            } catch(e) {
                console.error(e);
                statusDiv.innerHTML = `❌ Erro: ${e.message}`;
                return false;
            }
        }
        
        function detectar() {
            if (!cameraAtiva || !video.videoWidth || !detector) {
                if (cameraAtiva) {
                    animationId = requestAnimationFrame(detectar);
                }
                return;
            }
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const markers = detector.detect(imageData);
                
                if (markers && markers.length > 0) {
                    statusDiv.innerHTML = `✅✅✅ DETECTADO! ID: ${markers[0].id} ✅✅✅`;
                    statusDiv.className = 'status detected';
                    
                    const corners = markers[0].corners;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(corners[0].x, corners[0].y);
                    for (let i = 1; i < corners.length; i++) {
                        ctx.lineTo(corners[i].x, corners[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 22px system-ui';
                    ctx.fillText(`ID: ${markers[0].id}`, corners[0].x, corners[0].y - 10);
                } else {
                    statusDiv.innerHTML = '🔍 Procurando marcador 4x4 ID 1... (usando dados do seu arquivo)';
                    statusDiv.className = 'status';
                }
            } catch(e) {
                console.error(e);
            }
            
            animationId = requestAnimationFrame(detectar);
        }
        
        async function ativarCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
            
            statusDiv.innerHTML = '📷 Solicitando permissão da câmera...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                
                video.srcObject = stream;
                video.style.display = "block";
                
                video.onloadedmetadata = () => {
                    video.play();
                    cameraAtiva = true;
                    statusDiv.innerHTML = '📷 Câmera ativa! Procurando marcador 4x4...';
                    if (!animationId) detectar();
                };
            } catch(err) {
                let msg = err.name === 'NotAllowedError' 
                    ? 'Permissão negada. Vá em Configurações e permita a câmera.' 
                    : err.message;
                statusDiv.innerHTML = `❌ ${msg}`;
            }
        }
        
        btnCamera.addEventListener('click', ativarCamera);
        inicializarDetector();
        
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
